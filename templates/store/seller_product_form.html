{% extends 'base.html' %}

{% block title %}{% if is_edit %}Edit Product{% else %}Add Product{% endif %} - CodeMart{% endblock %}

{% block content %}
<h1 class="page-title">{% if is_edit %}Edit Product{% else %}Add Product{% endif %}</h1>

<form method="post" enctype="multipart/form-data" class="card">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% if is_edit %}Save Changes{% else %}Create Product{% endif %}</button>
</form>
{% endblock %}
